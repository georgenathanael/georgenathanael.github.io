<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: #000000;
        }

        header {
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 20px 10px;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1, h2 {
            margin-bottom: 10px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 5px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin: 15px 0;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: rgb(0, 0, 0);
            padding: 10px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        a:hover {
            color: #357abd;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #000000;
        }
    </style>
</head>

<body>

<header>
    <h1>GEORGE NATHANAEL M. ESPIRITU</h1>
    <p>BSIT - 1B.</p>
</header>

<main>
    <h2>Hobbies</h2>
    <ul>
        <li> RIDING</li>
        <li> PLAYING</li>
        <li> EATING</li>
    </ul>

    <a href="https://github.com" target="_blank">Visit GitHub</a>
</main>

<footer>
    <p>© 2026 GEORGE NATHANAEL M. ESPIRITU</p>
</footer>

</body>
</html>
